name: nf-core linting
on:
  push:
    branches:
      - dev
  pull_request:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      nf-core_version:
        type: choice
        description: "NF-Core version to use"
        required: true
        default: "3.5.1"
        options:
          - "3.2.0"
          - "3.3.2"
          - "3.5.1"
      lint_options:
        type: choice
        description: "Linting options"
        required: true
        default: "pipelines"
        options:
          - "all"
          - "pipelines"
          - "modules"
          - "subworkflows"
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  nf-core-lint:
    uses: cdcent/oamd-bio-gh-actions/.github/workflows/lint.yml@main
    with:
      nf-core_version: ${{ inputs.nf-core_version || '3.5.1' }}
      lint_options: ${{ inputs.lint_options || 'pipelines' }}
    secrets: inherit
