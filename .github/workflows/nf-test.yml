name: Run nf-test CI/CD
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - dev
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      max_parallel:
        description: "Maximum number of parallel test runs"
        required: false
        default: 2
        type: number
      full_test:
        description: "Run full test suite"
        required: false
        default: false
        type: boolean
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  nf-test:
    strategy:
      matrix:
        NXF_VER: ["25.04.0"]
    uses: cdcent/oamd-bio-gh-actions/.github/workflows/nf-test.yml@main
    with:
      run_on_aws: true
      max_parallel: ${{ fromJSON(inputs.max_parallel || 2) }}
      aws_s3_bucket: ""
      only_changed: ${{ !inputs.full_test }}
      nft_profile: "standard,dev_reg"
      nxf_version: ${{ matrix.NXF_VER }}
    secrets: inherit
