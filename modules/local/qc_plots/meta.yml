name: "qc_plots"
description: Create QC scatter plots for DENV analysis
keywords:
  - dengue
  - plots
  - qc
  - visualization
tools:
  - qc_plots:
      description: |
        Creates scatter plots for variant counts and Ct values vs coverage,
        colored by serotype. Uses matplotlib with Agg backend.
      args_id: "n/a (Python template, no task.ext.args)"
      homepage: https://github.com/cdcent/oamd-bio-denver
      licence: ["MIT"]

input:
  - serotype_calls:
      type: file
      description: Serotype calls TSV with sample IDs and coverage
      pattern: "serotype_calls.tsv"
      mandatory: true
  - variants_summary:
      type: file
      description: Variants summary TSV with counts per sample
      pattern: "variants_summary.tsv"
      mandatory: true
  - ct_data:
      type: file
      description: |
        Optional Ct values file (TSV format with sample_id and ct columns).
        Pass empty file [] if not available.
      pattern: "*.tsv"
      mandatory: false

output:
  - variant_plot:
      type: file
      description: Scatter plot of variant counts per sample
      pattern: "variant_plot.pdf"
  - ct_plot:
      type: file
      description: Scatter plot of Ct vs coverage (only produced if Ct data provided)
      pattern: "ct_plot.pdf"
      optional: true
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"

authors:
  - "@smagala"
maintainers:
  - "@smagala"
