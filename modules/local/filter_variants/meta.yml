name: "filter_variants"
description: Filter ivar variants to intrahost SNVs (iSNVs)
keywords:
  - dengue
  - variants
  - isnv
  - filter
tools:
  - filter_variants:
      description: |
        Filters ivar variant calls to identify intrahost SNVs (iSNVs).
        Keeps variants with allele frequency between min and max thresholds,
        indicating true intrahost variation.
      args_id: "n/a (Python template, no task.ext.args)"
      homepage: https://github.com/cdcent/oamd-bio-denver
      licence: ["MIT"]

input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. `[ id:'sample1' ]`
      mandatory: true
  - variants:
      type: file
      description: ivar variants TSV file
      pattern: "*.variants.tsv"
      mandatory: true
  - isnv_min_freq:
      type: val
      description: Minimum allele frequency threshold for iSNV filtering
      mandatory: true
  - isnv_max_freq:
      type: val
      description: Maximum allele frequency threshold for iSNV filtering
      mandatory: true

output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. `[ id:'sample1' ]`
  - filtered_variants:
      type: file
      description: Filtered variants with renamed columns
      pattern: "*_variants_frequency.tsv"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"

authors:
  - "@smagala"
maintainers:
  - "@smagala"
