title: "Denver DENV Pipeline Report"
subtitle: "Dengue Virus Serotype Analysis"
intro_text: False

report_comment: >
  This report has been generated by the <a href="https://github.com/cdcent/oamd-bio-denver/tree/dev" target="_blank">Denver</a>
  analysis pipeline for Dengue virus serotype identification, consensus generation, and variant detection.

report_section_order:
  software_versions:
    order: -1000
  "denver-summary":
    order: -1001
  "denver-methods-description":
    order: -1002

module_order:
  - fastqc
  - nextclade
  - samtools

export_plots: true
disable_version_detection: true

# Custom search patterns to find Falco output files
# Falco outputs *_fastqc_data.txt instead of fastqc_data.txt
sp:
  fastqc/data:
    fn: "*_fastqc_data.txt"
