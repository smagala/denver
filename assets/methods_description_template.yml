data: |
  <h4>DENV Pipeline Summary</h4>
  <p><strong>Purpose:</strong> The Denver pipeline analyzes Dengue virus (DENV) Illumina sequencing data to identify serotypes, generate consensus sequences, and detect within-host variants (iSNVs).</p>
  <p><strong>Origin:</strong> This pipeline is a Nextflow port of the DENV_pipeline developed by Verity Hill and Chrispin Chaguza (Grubaugh Lab), published in BMC Genomics 2024. The original Snakemake implementation is available at <a href="https://github.com/grubaughlab/DENV_pipeline">https://github.com/grubaughlab/DENV_pipeline</a>.</p>
  <p><strong>Workflow:</strong></p>
  <ol>
    <li><strong>Read QC</strong> - Falco quality assessment of input reads</li>
    <li><strong>Alignment</strong> - BWA-MEM mapping against all DENV serotypes (DENV1-4 + sylvatic variants)</li>
    <li><strong>Primer Trimming</strong> - iVar trim removes amplicon primers with Q20 sliding window filtering</li>
    <li><strong>Consensus Generation</strong> - iVar consensus calling (default: &ge;10x depth, &ge;75% allele frequency)</li>
    <li><strong>Serotype Assignment</strong> - Coverage-based serotype calling (&ge;50% genome coverage threshold)</li>
    <li><strong>Variant Detection</strong> - iVar variant calling with iSNV annotation (20-80% frequency range)</li>
  </ol>
  <p><strong>Key Outputs:</strong> Consensus sequences, serotype assignments, annotated variant tables, and per-position coverage profiles for each sample&times;serotype combination.</p>
  <p><strong>Enhancements:</strong> The Nextflow implementation adds MultiQC reporting, uses Falco (3x faster than FastQC), follows ph-core standards with containerized modules, and uses Nextclade for alignment with MAFFT fallback (matching the original's nextalign/MAFFT strategy).</p>

  <h4>CDC AMDPS Containers</h4>
  <p>Bioinformatics tools are deployed as Docker containers following CDC AMDP standardized build practices to ensure security, reproducibility, and efficiency.</p>
  <ul>
    <li><strong>Base Image:</strong> All containers inherit from a hardened Ubuntu 24.04 base image providing AWS S3 access (s5cmd), process monitoring (procps), and non-root execution.</li>
    <li><strong>Build Strategy:</strong> Only runtime libraries are included in final docker images. Development packages, compilers, and build tools are excluded.</li>
    <li><strong>Efficiency:</strong> Standard build patterns enable Docker layer sharing across containers.</li>
    <li><strong>Reproducibility:</strong> Container images are tagged with digests derived from the registry SHA, ensuring identical builds can be traced and reproduced.</li>
    <li><strong>Security:</strong> Each container build undergoes automated vulnerability scanning for HIGH and CRITICAL CVEs.</li>
  </ul>

  <h4>Methods</h4>
  <p>Data was processed using Denver v${workflow.manifest.version} ${doi_text}, a Nextflow implementation following ph-core standards built using the nf-core framework (<a href="https://doi.org/10.1038/s41587-020-0439-x">Ewels <em>et al.</em>, 2020</a>).</p>
  <p>The pipeline was executed with Nextflow v${workflow.nextflow.version} (<a href="https://doi.org/10.1038/nbt.3820">Di Tommaso <em>et al.</em>, 2017</a>) with the following command:</p>
